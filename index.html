<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="favicon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#6366f1" />
    <link rel="apple-touch-icon" href="favicon.png" />
    <link id="manifest-link" rel="manifest" href="manifest-parent.json" />
    <script>
      (function() {
        const manifestLink = document.getElementById('manifest-link');
        if (window.location.pathname.includes('/kid')) {
          manifestLink.setAttribute('href', 'manifest-kid.json');
        } else {
          manifestLink.setAttribute('href', 'manifest-parent.json');
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Heebo:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>CogFun - Digital Success Box</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
